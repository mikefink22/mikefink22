name: Generate Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: generate-stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: mikefink22
          template: classic
          base: header, activity, repositories
          # Mostrar lenguajes de programación usados en los repositorios
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          config_timezone: America/Argentina/Cordoba
          
          # Para ocultar la imagen
          filename: github-metrics.svg
          output_action: push
          committer_branch: output
          committer_message: "feat: update metrics [skip ci]"
